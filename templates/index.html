{% extends 'layout.html' %} {% block content %}
<h1>Login</h1>
<form action="/" method="post" class="box">
  {{ form.csrf_token }}
  <div class="input__wrapper">
    {{ form.username.label }} {{ form.username }}
  </div>
  <div class="input__wrapper">
    {{ form.password.label }} {{ form.password }}
  </div>
  {{form.submit }}
</form>
<!-- User message -->
{% if msg %}
<div>{{ msg|safe }}</div>
{% endif %} {% endblock %}
