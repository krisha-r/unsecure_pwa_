{% extends 'layout.html' %} {% block content %}
<h1>Welcome {{ value }}!</h1>
<form action="/success.html" method="post" class="box">
  {{ form.csrf_token }}
  <div class="input__wrapper">
    {{ form.feedback.label }} {{ form.feedback(class_="input__field") }}
  </div>
  {{form.submit(class_="btn") }}
</form>

<hr />
<br />
<h1>Others feedback</h1>

<div>
  {%for i in feedback%}
  <p>{{i}}</p>
  {% endfor %}
</div>
{% endblock %}
